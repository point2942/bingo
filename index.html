<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>賓果抽籤機</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #12082e;
    font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* ── Root: vertical stack filling 100vh ── */
  .root {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dynamic viewport height for mobile */
  }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(160,140,255,0.6);
    white-space: nowrap;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .field {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .field label {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .field input {
    width: 58px;
    padding: 5px 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    outline: none;
  }
  .field input:focus { border-color: rgba(160,140,255,0.7); }

  .stats-row {
    display: flex;
    gap: 0.4rem;
  }
  .stat-box {
    text-align: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 3px 10px;
    min-width: 46px;
  }
  .stat-box .val { font-size: 1rem; font-weight: 700; color: #c8baff; }
  .stat-box .lbl { font-size: 0.58rem; color: rgba(255,255,255,0.38); letter-spacing: 1px; }

  /* ── DRAW AREA (top section, fixed height) ── */
  .draw-area {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    padding: 0.7rem 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  /* Big ball */
  .ball-ring {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .ball-ring.idle {
    background: radial-gradient(circle at 38% 35%, rgba(255,255,255,0.08), transparent 55%),
                conic-gradient(from 0deg, #2a1f5a, #3a2f7a, #2a1f5a);
    box-shadow: 0 0 40px rgba(80,60,160,0.25);
  }
  .ball-ring.active {
    box-shadow: 0 0 60px rgba(124,92,252,0.55), 0 0 120px rgba(124,92,252,0.2);
  }
  .ball-inner {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    background: #12082e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #displayNum {
    font-size: 3.6rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    letter-spacing: -2px;
  }
  #displayNum.hint {
    font-size: 0.75rem;
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
  }

  /* Right of ball: controls */
  .draw-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
  }
  .ball-label {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-align: center;
  }
  .btn-draw {
    width: 100%;
    max-width: 180px;
    padding: 12px 0;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 4px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #7c5cfc, #c084fc);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,92,252,0.5);
    transition: transform 0.12s, box-shadow 0.2s;
  }
  .btn-draw:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,92,252,0.7); }
  .btn-draw:active:not(:disabled) { transform: scale(0.97); }
  .btn-draw:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-row {
    display: flex;
    gap: 0.5rem;
    width: 100%;
    max-width: 180px;
  }
  .btn-reset {
    flex: 1;
    padding: 8px 0;
    font-size: 0.78rem;
    font-weight: 500;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.13); }

  /* Voice toggle button */
  .btn-voice {
    flex: 1;
    padding: 8px 0;
    font-size: 0.78rem;
    font-weight: 500;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    letter-spacing: 0;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .btn-voice.on {
    background: rgba(124,92,252,0.25);
    border-color: rgba(124,92,252,0.6);
    color: #c8baff;
  }

  #doneBanner {
    display: none;
    padding: 5px 16px;
    border-radius: 50px;
    background: rgba(255,200,50,0.12);
    border: 1px solid rgba(255,200,50,0.35);
    color: #ffd750;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-align: center;
  }

  /* ── HISTORY PANEL (fills remaining space) ── */
  .history-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0.6rem 0.8rem 0.5rem;
    min-height: 0;
  }
  .history-header {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    flex-shrink: 0;
    text-align: center;
  }
  #historyGrid {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 8px;
    padding-bottom: 4px;
    /* make scrollable area smaller so all chips visible */
    min-height: 0;
  }
  #historyGrid::-webkit-scrollbar { width: 3px; }
  #historyGrid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .num-chip {
    /* Responsive chip size: fill row evenly */
    flex: 0 0 calc(16.666% - 7px); /* 6 per row default */
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 800;
    color: #fff;
    animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    text-shadow: 0 1px 4px rgba(0,0,0,0.35);
    cursor: default;
  }
  .num-chip.newest::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.9);
    animation: fadeRing 1.4s ease forwards;
  }
  /* Latest chip highlight above grid */
  .latest-row {
    display: none;
    align-items: center;
    gap: 0.8rem;
    padding: 0.4rem 0.6rem;
    margin-bottom: 0.5rem;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .latest-ball {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    animation: popIn 0.38s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
  }
  .latest-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .latest-info .li-label {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
  }
  .latest-info .li-num {
    font-size: 1.5rem;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .latest-info .li-order {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
  }

  .empty-hint {
    color: rgba(255,255,255,0.18);
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-align: center;
    padding: 2rem 0;
    width: 100%;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeRing {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.6); }
  }
  @keyframes rollNum {
    0%   { transform: translateY(-16px); opacity: 0; }
    60%  { transform: translateY(2px); opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }
  .rolling { animation: rollNum 0.1s ease forwards; }

  /* ── Larger screens: switch to side-by-side ── */
  @media (min-width: 600px) and (orientation: landscape) {
    .root {
      flex-direction: row;
      flex-wrap: wrap;
    }
    .header {
      width: 100%;
      flex-shrink: 0;
    }
    .draw-area {
      flex-direction: column;
      width: 280px;
      flex-shrink: 0;
      border-bottom: none;
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 1.5rem 1rem;
      height: calc(100vh - 56px);
    }
    .ball-ring { width: 180px; height: 180px; }
    .ball-inner { width: 144px; height: 144px; }
    #displayNum { font-size: 5rem; }
    .draw-controls { width: 100%; }
    .history-panel {
      flex: 1;
      height: calc(100vh - 56px);
    }
    .num-chip {
      flex: 0 0 calc(14.28% - 7px); /* 7 per row on wider */
    }
  }
</style>
</head>
<body>
<div class="root">

  <!-- HEADER -->
  <div class="header">
    <h1>🎱 賓果抽籤機</h1>
    <div class="header-right">
      <div class="field">
        <label>最小值</label>
        <input type="number" id="minVal" value="1" min="1">
      </div>
      <div class="field">
        <label>最大值</label>
        <input type="number" id="maxVal" value="50" min="2">
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="val" id="statRemain">50</div><div class="lbl">剩餘</div></div>
        <div class="stat-box"><div class="val" id="statDrawn">0</div><div class="lbl">已抽</div></div>
        <div class="stat-box"><div class="val" id="statTotal">50</div><div class="lbl">總數</div></div>
      </div>
    </div>
  </div>

  <!-- DRAW AREA -->
  <div class="draw-area">
    <div class="ball-ring idle" id="ballRing">
      <div class="ball-inner">
        <span id="displayNum" class="hint">等待抽籤</span>
      </div>
    </div>

    <div class="draw-controls">
      <div class="ball-label" id="ballLabel">按下按鈕開始</div>
      <button class="btn-draw" id="btnDraw" onclick="draw()">抽 ！</button>
      <div class="btn-row">
        <button class="btn-reset" onclick="resetGame()">🔄 重新</button>
        <button class="btn-voice on" id="btnVoice" onclick="toggleVoice()">🔊 語音</button>
      </div>
      <div id="doneBanner">🎉 全部抽完！</div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="history-panel">
    <!-- Latest drawn row -->
    <div class="latest-row" id="latestRow">
      <div class="latest-ball" id="latestBall"></div>
      <div class="latest-info">
        <div class="li-label">最新號碼</div>
        <div class="li-num" id="latestNum">—</div>
        <div class="li-order" id="latestOrder"></div>
      </div>
    </div>
    <div class="history-header" id="historyHeader">已抽出號碼</div>
    <div id="historyGrid"><div class="empty-hint">尚未抽出任何號碼</div></div>
  </div>

</div>

<script>
const BALL_COLORS = [
  'linear-gradient(135deg,#7c5cfc,#c084fc)',
  'linear-gradient(135deg,#0ea5e9,#38bdf8)',
  'linear-gradient(135deg,#10b981,#34d399)',
  'linear-gradient(135deg,#f59e0b,#fbbf24)',
  'linear-gradient(135deg,#ef4444,#f87171)',
  'linear-gradient(135deg,#ec4899,#f472b6)',
  'linear-gradient(135deg,#8b5cf6,#a78bfa)',
  'linear-gradient(135deg,#06b6d4,#22d3ee)',
];

let pool = [], drawn = [];
let rolling = false;
let rollInterval = null;
let voiceOn = true;

/* ── Voice ── */
var voiceList = [];

function loadVoices() {
  if (!window.speechSynthesis) return;
  var v = window.speechSynthesis.getVoices();
  if (v.length > 0) voiceList = v;
}
if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function getBestVoice() {
  loadVoices();
  return voiceList.find(function(v){ return v.lang==='zh-TW'; })
      || voiceList.find(function(v){ return v.lang==='zh-Hant'; })
      || voiceList.find(function(v){ return v.lang.startsWith('zh'); })
      || null;
}

// iOS KEY RULE: speechSynthesis.speak() MUST be called synchronously
// inside a user-gesture handler. Any setTimeout wrapping will break it.
// Solution: speak() is called directly from draw()'s setInterval callback
// which itself was triggered by the button click — that's still within
// the gesture trust chain on most browsers EXCEPT iOS.
// So we instead call speak() at the moment the BUTTON is pressed,
// before the roll animation, and use a queued utterance approach.

var pendingNum = null;

function speak(num) {
  if (!voiceOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var utt = new SpeechSynthesisUtterance(String(num));
  utt.lang = 'zh-TW';
  utt.rate = 0.80;
  utt.pitch = 1.0;
  utt.volume = 1.0;
  var best = getBestVoice();
  if (best) utt.voice = best;
  window.speechSynthesis.speak(utt);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('btnVoice');
  btn.textContent = voiceOn ? '🔊 語音' : '🔇 語音';
  btn.className = voiceOn ? 'btn-voice on' : 'btn-voice';
}

/* ── Game logic ── */
function getMin() { return parseInt(document.getElementById('minVal').value) || 1; }
function getMax() { return parseInt(document.getElementById('maxVal').value) || 50; }

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function buildPool() {
  const mn = getMin(), mx = getMax();
  pool = [];
  for (let i = mn; i <= mx; i++) pool.push(i);
  shuffle(pool);
  drawn = [];
}

function resetGame() {
  if (rollInterval) { clearInterval(rollInterval); rollInterval = null; }
  rolling = false;
  buildPool();
  updateStats();

  const dn = document.getElementById('displayNum');
  dn.textContent = '等待抽籤';
  dn.className = 'hint';
  dn.style.fontSize = '';

  document.getElementById('ballLabel').textContent = '按下按鈕開始';
  const ring = document.getElementById('ballRing');
  ring.className = 'ball-ring idle';
  ring.style.background = '';
  ring.style.boxShadow = '';

  document.getElementById('btnDraw').disabled = false;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('historyGrid').innerHTML = '<div class="empty-hint">尚未抽出任何號碼</div>';
  document.getElementById('latestRow').style.display = 'none';
}

function draw() {
  if (rolling || !pool.length) return;
  rolling = true;
  document.getElementById('btnDraw').disabled = true;

  const finalNum = pool.pop();
  drawn.push(finalNum);
  const colorIdx = (drawn.length - 1) % BALL_COLORS.length;
  const color = BALL_COLORS[colorIdx];

  // ── iOS CRITICAL: speak() MUST be called synchronously here,
  //    directly inside the onclick handler stack, before any
  //    setTimeout or setInterval. iOS blocks audio from async contexts.
  speak(finalNum);

  const mn = getMin(), mx = getMax();
  const range = mx - mn + 1;
  const dn = document.getElementById('displayNum');
  const ring = document.getElementById('ballRing');

  ring.className = 'ball-ring active';
  ring.style.background = `radial-gradient(circle at 38% 35%, rgba(255,255,255,0.18), transparent 55%), ${color}`;

  let ticks = 0;
  const totalTicks = 20;

  rollInterval = setInterval(function() {
    ticks++;
    const randNum = mn + Math.floor(Math.random() * range);
    dn.className = '';
    dn.style.fontSize = randNum >= 100 ? '2.8rem' : '3.6rem';
    dn.textContent = randNum;
    void dn.offsetWidth;
    dn.classList.add('rolling');

    if (ticks >= totalTicks) {
      clearInterval(rollInterval);
      rollInterval = null;
      dn.textContent = finalNum;
      dn.className = '';
      dn.style.fontSize = finalNum >= 100 ? '2.8rem' : '3.6rem';
      void dn.offsetWidth;
      dn.classList.add('rolling');

      document.getElementById('ballLabel').textContent = '第 ' + drawn.length + ' 顆抽出';
      updateStats();
      addToHistory(finalNum, color, drawn.length);
      rolling = false;

      if (pool.length > 0) {
        document.getElementById('btnDraw').disabled = false;
      } else {
        document.getElementById('doneBanner').style.display = 'block';
        ring.style.background = `radial-gradient(circle at 38% 35%, rgba(255,255,255,0.18), transparent 55%), linear-gradient(135deg,#f59e0b,#fbbf24)`;
        ring.style.boxShadow = '0 0 60px rgba(245,158,11,0.65), 0 0 120px rgba(245,158,11,0.25)';
      }
    }
  }, 55);
}

function addToHistory(num, color, idx) {
  const grid = document.getElementById('historyGrid');
  const empty = grid.querySelector('.empty-hint');
  if (empty) empty.remove();

  // Remove newest ring from old chips
  grid.querySelectorAll('.num-chip.newest').forEach(function(c) { c.classList.remove('newest'); });

  // Update latest row
  const lr = document.getElementById('latestRow');
  const lb = document.getElementById('latestBall');
  lr.style.display = 'flex';
  lb.style.background = color;
  lb.textContent = num;
  lb.style.animation = 'none';
  void lb.offsetWidth;
  lb.style.animation = '';
  document.getElementById('latestNum').textContent = num;
  document.getElementById('latestOrder').textContent = '第 ' + idx + ' 顆抽出';

  // Add small chip to grid (newest on top)
  const chip = document.createElement('div');
  chip.className = 'num-chip newest';
  chip.style.background = color;
  chip.textContent = num;
  chip.title = '第 ' + idx + ' 顆';
  grid.prepend(chip);
}

function updateStats() {
  const mn = getMin(), mx = getMax();
  const total = Math.max(0, mx - mn + 1);
  document.getElementById('statRemain').textContent = pool.length;
  document.getElementById('statDrawn').textContent = drawn.length;
  document.getElementById('statTotal').textContent = total;
}

document.getElementById('minVal').addEventListener('change', resetGame);
document.getElementById('maxVal').addEventListener('change', resetGame);

resetGame();
</script>
</body>
</html>
